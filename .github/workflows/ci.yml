name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
      - name: Run tests
        run: go test ./...
      - name: Build binary
        run: mkdir -p dist && go build -o dist/pr-size ./cmd/pr-size
