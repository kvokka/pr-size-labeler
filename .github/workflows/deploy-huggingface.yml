name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-public-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Build Linux binary for Hugging Face
        run: |
          mkdir -p deploy/huggingface-space
          GOOS=linux GOARCH=amd64 go build -o deploy/huggingface-space/pr-size ./cmd/pr-size
      - name: Prepare Hugging Face Space files
        run: |
          cp deploy/huggingface-space.template/Dockerfile deploy/huggingface-space/Dockerfile
          cp deploy/huggingface-space.template/README.md deploy/huggingface-space/README.md
      - name: Deploy public Space
        uses: kvokka/huggingface@v0
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          huggingface_repo: ${{ vars.HUGGINGFACE_SPACE }}
          repo_type: space
          private: false
          source_dir: deploy/huggingface-space
